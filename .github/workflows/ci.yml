on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root deps
        run: npm install

      - name: Install app deps
        run: npm run install:all

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
