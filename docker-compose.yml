services:
  mongodb:
    image: mongo:7
    container_name: tradereplay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: tradereplay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: http://localhost:8080
      DEV_MONGO_URI: mongodb://mongodb:27017/tradereplay
      DEV_REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-secret
      USD_TO_INR: 83.5
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis

volumes:
  mongo_data:
  redis_data:
