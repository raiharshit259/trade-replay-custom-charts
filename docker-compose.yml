services:
  mongodb:
    image: mongo:7
    container_name: tradereplay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: tradereplay-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: tradereplay-kafka
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: http://localhost:8080
      DEV_MONGO_URI: mongodb://mongodb:27017/tradereplay
      DEV_REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://mongodb:27017/tradereplay
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: docker-dev-secret
      USD_TO_INR: 83.5
    ports:
      - "4000:4000"
    depends_on:
      - mongodb
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-worker
    restart: unless-stopped
    command: npm run start:worker
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/tradereplay
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: docker-dev-secret
      USD_TO_INR: 83.5
    depends_on:
      - mongodb
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  logo-service:
    build:
      context: ./services/logo-service
    container_name: tradereplay-logo-service
    restart: unless-stopped
    command: npm run start
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/tradereplay
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      AWS_REGION: ${AWS_REGION:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_CDN_BASE_URL: ${AWS_CDN_BASE_URL:-}
    depends_on:
      - mongodb
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradereplay-kafka-service
    restart: unless-stopped
    command: npm run start:kafka
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: "true"
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: docker-dev-secret
      USD_TO_INR: 83.5
    depends_on:
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  redis_data:
